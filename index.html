<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hellgate Prison Release Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #ddd;
      margin: 0;
      padding: 20px;
    }
    .container {
      display: flex;
      gap: 25px;
      flex-wrap: wrap;
      max-width: 1800px;
      margin: 0 auto;
    }
    .form {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 8px;
      width: 380px;
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      background: #222;
      color: #ddd;
      border: 1px solid #444;
      border-radius: 4px;
    }
    button {
      background: #800000;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #a00000; }
    /* Responsive HiDPI-aware canvas: keep 1:1 aspect ratio while allowing layout flexibility */
    canvas {
      width: 100%;
      max-width: 1024px;
      height: auto;
      aspect-ratio: 1/1;
      border: 3px solid #444;
      background: #000;
      box-shadow: 0 0 20px rgba(0,0,0,0.8);
      flex: 1 1 1024px; /* allow canvas to grow/shrink in the flex container */
      display: block; /* avoid baseline gaps inside flex */
    }
    .advanced { margin-top: 15px; }
    .advanced h3 { margin: 10px 0 5px; color: #aaa; }
  </style>
</head>
<body>
  <h1 style="text-align:center; color:#c00;">HELLGATE PRISON — Release Papers Generator</h1>

  <div class="container">
    <!-- Controls -->
    <div class="form">
      <h2>Prisoner Info</h2>
      <label>Prisoner Name</label>
      <input type="text" id="prisoner" value="Luna Voss">

      <label>Prisoner Number</label>
      <input type="text" id="reg" value="X0000">

      <label>Date of Release</label>
      <input type="text" id="date" value="June 16, 2026">

      <label>Signature Name</label>
      <input type="text" id="signature" value="Emma O'Neil">

     <label>Days Served</label>
      <input type="text" id="days" value="1"> 

      <hr>

      <h2>Styling & QR</h2>
      <label>Font Family</label>
      <select id="fontFamily">
        <option value="Arial">Arial</option>
        <option value="Georgia">Georgia</option>
        <option value="Times New Roman">Times New Roman</option>
        <option value="Courier New">Courier New</option>
        <option value="Impact">Impact</option>
      </select>

      <button onclick="generateImage()">Generate Preview</button>
      <button onclick="downloadImage()">Download 1024×1024 PNG</button>

      <div class="advanced">
        <h3>Advanced Positioning</h3>
        <small>Adjust as needed</small>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
          <label>Name X</label><input type="number" id="nameX" value="536">
          <label>Name Y</label><input type="number" id="nameY" value="264">
          <label>Reg X</label><input type="number" id="regX" value="536">
          <label>Reg Y</label><input type="number" id="regY" value="209">
          <label>Date X</label><input type="number" id="dateX" value="602">
          <label>Date Y</label><input type="number" id="dateY" value="490">
          <label>Signature X</label><input type="number" id="sigX" value="72">
          <label>Signature Y</label><input type="number" id="sigY" value="820">
          <label>Days X</label><input type="number" id="dayX" value="602">
          <label>Days Y</label><input type="number" id="dayY" value="547">
        </div>
      </div>
    </div>

    <!-- Canvas -->
    <canvas id="canvas" width="1024" height="1024"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let bgImage = new Image();

    // Replace with your cleaned background URL or local path
    bgImage.src = 'hellgate-background.png'; // ← Put your 1024x1024 background here

    bgImage.onload = () => generateImage();

    // Resize the canvas backing store to match its displayed size and devicePixelRatio
    function resizeCanvasForDisplay(canvas, ctx) {
      const dpr = window.devicePixelRatio || 1;
      // clientWidth is the CSS pixel width
      const displayWidth = Math.max(1, Math.round(canvas.clientWidth));

      // Force a square display: use the width as the height so the canvas is always 1:1 on-screen
      const displaySize = displayWidth;

      // Ensure the canvas CSS height matches the computed square size.
      // This forces the element to appear square in CSS layout regardless of flex differences.
      if (Math.round(canvas.clientHeight) !== displaySize) {
        canvas.style.height = displaySize + 'px';
      }

      // Backing store size in device pixels
      const targetWidth = Math.round(displaySize * dpr);
      const targetHeight = Math.round(displaySize * dpr);

      if (canvas.width !== targetWidth || canvas.height !== targetHeight) {
        canvas.width = targetWidth;
        canvas.height = targetHeight;
        // Map CSS pixel coordinates to the backing store (so drawing commands use CSS px)
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      } else {
        // still ensure transform is correct
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      return { displayWidth: displaySize, displayHeight: displaySize, dpr };
    }

    function generateImage() {
      // ensure canvas internal size matches CSS size (and DPR) and get display size
      const { displayWidth, displayHeight } = resizeCanvasForDisplay(canvas, ctx);

      // Clear using CSS-coordinates (transform maps them correctly)
      ctx.clearRect(0, 0, displayWidth, displayHeight);

      // Draw background scaled to current displayed size
      if (bgImage.complete) {
        ctx.drawImage(bgImage, 0, 0, displayWidth, displayHeight);
      } else {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, displayWidth, displayHeight);
      }

      const prisoner = document.getElementById('prisoner').value;
      const reg = document.getElementById('reg').value;
      const date = document.getElementById('date').value;
      const signature = document.getElementById('signature').value;
      const days = document.getElementById('days').value;
      const fontFamily = document.getElementById('fontFamily').value;

      // Get positions (these are stored assuming a 1024x1024 layout)
      const nameX = parseInt(document.getElementById('nameX').value);
      const nameY = parseInt(document.getElementById('nameY').value);
      const regX = parseInt(document.getElementById('regX').value);
      const regY = parseInt(document.getElementById('regY').value);
      const dateX = parseInt(document.getElementById('dateX').value);
      const dateY = parseInt(document.getElementById('dateY').value);
      const sigX = parseInt(document.getElementById('sigX').value);
      const sigY = parseInt(document.getElementById('sigY').value);
      const dayX = parseInt(document.getElementById('dayX').value);
      const dayY = parseInt(document.getElementById('dayY').value);

      // Scale factor from the design (1024) to the current display size
      const scale = displayWidth / 1024;

      ctx.fillStyle = '#000000';
      ctx.textBaseline = 'top';

      // Prisoner Name (scale font sizes and positions)
      ctx.font = `italic ${32 * scale}px ${fontFamily}`;
      ctx.fillText(prisoner, nameX * scale, nameY * scale);

      // Reg Number
      ctx.font = `${42 * scale}px ${fontFamily}`;
      ctx.fillText(reg, regX * scale, regY * scale);

      // Date
      ctx.font = `${30 * scale}px ${fontFamily}`;
      ctx.fillText(date, dateX * scale, dateY * scale);

      // Signature (use brush script if available)
      ctx.font = `italic ${58 * scale}px 'Brush Script MT', cursive`;
      ctx.fillText(signature, sigX * scale, sigY * scale);

      // Days
      ctx.font = `${30 * scale}px ${fontFamily}`;
      ctx.fillText(days, dayX * scale, dayY * scale);

      // Printed name + title (scaled)
      ctx.font = `${28 * scale}px ${fontFamily}`;
      ctx.fillText(signature, sigX * scale, (sigY + 85) * scale);
      ctx.fillText("Hellgate Prison Release Officer", sigX * scale, (sigY + 115) * scale);

      // Generate QR Code (draw scaled)
      generateQRCode(prisoner, reg, date, scale);
    }

    function generateQRCode(name, reg, date, scale = 1) {
      // Clear previous QR if exists
      const oldQR = document.getElementById('qrContainer');
      if (oldQR) oldQR.remove();

      // Create temporary container
      const qrDiv = document.createElement('div');
      qrDiv.id = 'qrContainer';
      qrDiv.style.position = 'absolute';
      qrDiv.style.left = '-9999px';
      document.body.appendChild(qrDiv);

      const qrSize = 150; // design CSS size

      new QRCode(qrDiv, {
        text: `Prisoner: ${name}\nReg: ${reg}\nRelease Date: ${date}`,
        width: qrSize,
        height: qrSize,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
      });

      // Draw QR onto canvas after generation
      setTimeout(() => {
        const qrCanvas = qrDiv.querySelector('canvas');
        if (qrCanvas) {
          // draw using CSS coordinates (scale applied by caller)
          const x = 550 * scale;
          const y = 680 * scale;
          const size = qrSize * scale;
          ctx.drawImage(qrCanvas, x, y, size, size);
        }
        qrDiv.remove();
      }, 100);
    }

    function downloadImage() {
      // To create a 1:1 1024x1024 PNG, create a temporary canvas at 1024x1024
      const temp = document.createElement('canvas');
      temp.width = 1024;
      temp.height = 1024;
      const tctx = temp.getContext('2d');

      // draw the background at native size if available
      if (bgImage.complete) {
        tctx.drawImage(bgImage, 0, 0, 1024, 1024);
      } else {
        tctx.fillStyle = '#000';
        tctx.fillRect(0,0,1024,1024);
      }

      // Copy text and QR by re-rendering at 1024 space
      const prisoner = document.getElementById('prisoner').value;
      const reg = document.getElementById('reg').value;
      const date = document.getElementById('date').value;
      const signature = document.getElementById('signature').value;
      const days = document.getElementById('days').value;
      const fontFamily = document.getElementById('fontFamily').value;

      const nameX = parseInt(document.getElementById('nameX').value);
      const nameY = parseInt(document.getElementById('nameY').value);
      const regX = parseInt(document.getElementById('regX').value);
      const regY = parseInt(document.getElementById('regY').value);
      const dateX = parseInt(document.getElementById('dateX').value);
      const dateY = parseInt(document.getElementById('dateY').value);
      const sigX = parseInt(document.getElementById('sigX').value);
      const sigY = parseInt(document.getElementById('sigY').value);
      const dayX = parseInt(document.getElementById('dayX').value);
      const dayY = parseInt(document.getElementById('dayY').value);

      tctx.fillStyle = '#000000';
      tctx.textBaseline = 'top';

      tctx.font = `italic 32px ${fontFamily}`;
      tctx.fillText(prisoner, nameX, nameY);

      tctx.font = `42px ${fontFamily}`;
      tctx.fillText(reg, regX, regY);

      tctx.font = `30px ${fontFamily}`;
      tctx.fillText(date, dateX, dateY);

      tctx.font = `italic 58px 'Brush Script MT', cursive`;
      tctx.fillText(signature, sigX, sigY);

      tctx.font = `30px ${fontFamily}`;
      tctx.fillText(days, dayX, dayY);

      tctx.font = `28px ${fontFamily}`;
      tctx.fillText(signature, sigX, sigY + 85);
      tctx.fillText("Hellgate Prison Release Officer", sigX, sigY + 115);

      // Draw QR similarly by creating a temporary QR and drawing it
      const qrDiv = document.createElement('div');
      qrDiv.style.position = 'absolute';
      qrDiv.style.left = '-9999px';
      document.body.appendChild(qrDiv);

      new QRCode(qrDiv, {
        text: `Prisoner: ${prisoner}\nReg: ${reg}\nRelease Date: ${date}`,
        width: 150,
        height: 150,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
      });

      setTimeout(() => {
        const qrCanvas = qrDiv.querySelector('canvas');
        if (qrCanvas) {
          tctx.drawImage(qrCanvas, 520, 620, 150, 150);
        }
        qrDiv.remove();

        const link = document.createElement('a');
        const name = document.getElementById('prisoner').value.replace(/[^a-zA-Z0-9]/g, '_');
        link.download = `Hellgate_Release_${name}.png`;
        link.href = temp.toDataURL('image/png', 1.0);
        link.click();
      }, 150);
    }

    // Auto-generate on input change
    document.querySelectorAll('input, select').forEach(el => {
      el.addEventListener('input', generateImage);
    });

    // Also regenerate on window resize so the canvas backing store updates
    window.addEventListener('resize', () => generateImage());
  </script>
</body>
</html>
